[workspace]
members = ["server", "shared/types"]
resolver = "2"

[workspace.package]
edition = "2024"
version = "0.1.0"
publish = false

[workspace.dependencies]
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
typeshare = "1"
uuid = { version = "1", features = ["serde", "v4"] }

[profile.release]
debug = true
codegen-units = 1
lto = true
